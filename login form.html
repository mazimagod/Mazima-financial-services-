<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login form</title>
    
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap');
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "poppins", sans-serif;
        }
        body{
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: url(background.png) no-repeat;
            background-position: center;
            background-size: cover;
        }
        .wrapper{
            width: 600px;
            height: 500px;
            background: transparent;
            color: #fff;
            border-radius: 10px;
            border: 2px solid #fff;
            padding: 3rem;
            box-shadow: 10px 0 4px rgba(0, 0, 0, 0, 150);
            transition: all 300ms ease;
        }
        .wrapper:hover{
            background: url(background.png);
        
        }
        .wrapper h1{
            font-size: 36px;
            text-align: center;
        }
        .wrapper .input-box{ 
            position: relative;
            width: 90%;
            height: 50%;
            margin: 30px 50px;
            
        }
        .input-box input{
            width: 90%;
            height: 100%;
            background: transparent;
            border: 2px solid rgba(252, 247, 250, 0.952);
            border-radius: 40px;
            padding: 20px 45px 20px 20px;
            font-size: 20px;
        }
        .input-box input::placeholder{
            color: #fff;
        }.input-box span{
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 20px;
        }
        .wrapper .remember-forgot{
            display: flex;
            justify-content: center;
            font-size: 15px;
            margin: -15px 0 15px;
            gap: 7rem;


        }
        .remember-forgot label input{
            color: #fff;
            margin-right: 3px;
        }
        .remember-forgot a{
            color: #fff;
            text-decoration: none;
        }
        .remember-forgot a:hover{
            text-decoration: underline;

        }
        .wrapper .btn{
            width: 20%;
            height: 45px;
            background: #fff;
            border: none;
            outline: none;
            border-radius: 40px;
            box-shadow: 0 0 10px rgba(0, 0, 0, .2);
            cursor: pointer;
            font-size: 20px;
            margin-left: 40%;
            color: #333;
            font-weight: 600;


        }
        .wrapper .register-link{
            font-size: 17px;
            text-align: center;
            margin: 30px;
        }
        .register-link p a{
            color: #791515;
            text-decoration: none;
            font-weight: 600;
        }
        .wrapper .remember-forgot{
            font-size: 20px;

        }
    </style>
</head>
<body>
    <div class="wrapper">
        <form action="">
            <h1>Login</h1>
            <div class="input-box"><input type="text" placeholder="name" required>
                <span class="material-icons">person</span>
            </div>
            <div class="input-box"><input type="password"
                 placeholder="password" required>
                 <span class="material-icons">lock</span>
            </div>
            <div class="remember-forgot"><label><input type="checkbox">Remember me</label>
                <a href="#">Forgot password?</a>
            </div>
            <button type="submit" class="btn">Login</button>
            <div class="register-link"><p>Don't have an account?
                 <a href="registration.html">Register</a></p>
            </div>
            
        </form>
 
    </div>

    
</body>

</html>
