<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Registration form</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet">
      <link rel="stylesheet" href="style.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap');

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }
        body{
            display: flex;
            height: 100vh;
            justify-content: center;
            align-items: center;
            background: url(background.png) no-repeat;
            background-size: cover;
        }
        .container{
            max-width: 700px;
            width: 100%;
            background: #fff;
            padding: 40px 40px;
            border-radius: 7px;
            position: relative;
            transition: all 300ms ease;
        }
        .container:hover{
            background: url(background.png);
        }
        .container .title::before{
            content: '';
            position: absolute;
            height: 3px;
            width: 30px;
            background: #9b59b6;
        }
        .container .title{
            font-size: 20px;
            font-weight: 600;
            
        }
        .container form .user-details{
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            form .user-details .input-box{
                width: calc(100%/2-20px);
            }

        }
         form .user-details .input-box{
                width: calc(100%/2-20px);
                
            }
            .user-details .input-box .details{
                display: block;
                font-weight: 500;
                margin-bottom: 6px;
                padding-top: 40px;
                
            }
            .user-details .input-box input{
                height: 45px;
                width: 100%;
                outline: none;
                box-shadow: 2px 5px 5px rgba(255, 255, 255, 255);
                border-radius: 20px;
                border: 1px solid plum;
                padding-left: 15px;
                font-size: 16px;
                border-bottom-width: 2px;
                transition: all 2ms ease;

                

            }
            .container form .gender-details .gender-title{
                font-size: 20px;
                font-weight: 500;
                
                

            }
            .gender-details .category{
                display: flex;
                gap: 8rem;
                flex-wrap: wrap;
                padding-top: 1rem;
            }
            .container .btn{
                font-size: 20px;
                font-weight: 600;

                color: green;
                border-radius: 6px;
                box-shadow: 3px 4px 5px rgba(255, 255, 255, 255, -2);
                border: none;
                background: peachpuff;
                padding: 6px 6px;
                margin-top: 30px;
                
            }
            .container a button {
                color: green;
                text-decoration: none;
            }
    
    </style>
</head>
<body>
    <div class="container">
        <div class="title">Registration</div>
        <form action="#">
            <div class="user-details">
                
                <div class="input-box">
                    <span class="details">Full Name</span>
                    <input type="text" placeholder="Enter your name" required>
                    
                </div>
                <div class="input-box">
                    <span class="details">Username</span>
                    <input type="text" placeholder="Enter username" required>
                    
                </div>
                <div class="input-box">
                    <span class="details">Email</span>
                    <input type="text" placeholder="Enter your email" required>
                    
                </div>
                <div class="input-box">
                    <span class="details">Phone Number</span>
                    <input type="number" placeholder="Enter your number" required>
                    
                </div>
                <div class="input-box">
                    <span class="details">Password</span>
                    <input type="text" placeholder="Enter your password" required>
                    
                </div>
                <div class="input-box">
                    <span class="details">Confirm your password</span>
                    <input type="text" placeholder="Enter your password" required>
                    
                </div>
                <div class="gender-details">
            
                    <span class="gender-title">Gender</span>
                    <div class="category">
                        <div>
                            <input type="radio">
                            Male
                        </div>
                        <div>
                            <input type="radio">
                            Female
                        </div>
                        <div>
                            <input type="radio">
                            Prefer not to say
                        </div>
                    </div>
                   
                        <div>
                            <button type="submit" class="btn">Register</button>
                            <a href="assign.html">success</a></p>
                        </div>
                        
                    </div>
                    

                </div>
            </div>
        </form>
    </div>
</body>
</html>
